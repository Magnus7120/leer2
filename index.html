    // -------- SHUFFLE SYSTEM --------

    let shuffledReplies = [];
    let shuffleIndex = 0;

    function shuffleArray(array) {
      const a = array.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getNextReply() {

      if (shuffleIndex >= shuffledReplies.length) {
        shuffledReplies = shuffleArray(replies);
        shuffleIndex = 0;
      }

      const reply = shuffledReplies[shuffleIndex];
      shuffleIndex++;

      return reply;
    }

    function addLine(who, text) {
      const div = document.createElement('div');

      div.innerHTML = `<span class="${who === 'Du' ? 'u' : 'b'}">${who}:</span> ${escapeHtml(text)}`;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
      }[c]));
    }

    function botReply(userText){

      if (typeof r === "function")
        r = r(userText);

      const extra =
        Math.random() < 0.35
          ? ` (Checksum: ${Math.floor(Math.random()*9000+1000)})`
          : "";

      setTimeout(
        () => addLine("KI", r + extra),
        350 + Math.random()*700
      );
    }

    function send(){

      if(!t) return;
      msg.value = "";
      addLine("Du", t);
      botReply(t);
    }
