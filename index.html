<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>…</title>
  <style>
    body{font-family:system-ui,Arial,sans-serif;max-width:780px;margin:40px auto;padding:0 16px}
    .card{border:1px solid #ddd;border-radius:14px;padding:16px}
    #log{height:340px;overflow:auto;border:1px solid #eee;border-radius:12px;padding:12px;background:#fafafa}
    .m{margin:10px 0}
    .u{font-weight:600}
    .b{font-weight:600}
    .row{display:flex;gap:10px;margin-top:12px}
    input{flex:1;padding:10px 12px;border-radius:10px;border:1px solid #ddd}
    button{padding:10px 14px;border-radius:10px;border:1px solid #ddd;cursor:pointer}
    .hint{opacity:.7;font-size:.9rem;margin-top:10px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Hola Jose que gusto de hablar contigo, ps: tu hermano Magnus</h1>
    <div id="log"></div>

    <div class="row">
      <input id="msg" placeholder="Escribe algo …" autocomplete="off" />
      <button id="send">Senden</button>
    </div>

    <div class="hint">.</div>
  </div>

  <script>
    const log = document.getElementById('log');
    const msg = document.getElementById('msg');

    function fakeIp() {
      const a = () => Math.floor(Math.random() * 256);
      return `${a()}.${a()}.${a()}.${a()}`;
    }

    const replies = [
    "Eres una maquina primo",
      "siempre juntos siempre fuerte",
      "no empiezes algo que no puedas acabar",
      "saludos de tu hermano magnus",
      "en mis casa siempre eres bienvenido",
      "qualquier cosa me preguntas y te ayudo",
      "solo por hoy",
      "quien no se da por vencido la guerra no la a perdido",
      "un buen amigo no tiene precio",
      "es que sabe sabe y el que no no sabe",
      "constancia perseverancia y disciplina",
      "donde no hay excusas no hay fallo",
      "todo malo tiene algo bueno y todo lo bueno simplemente es bueno",
      "quien no es leal a sus amgigos tampoco es leal a uno mismo",
      "mejor pobre con amigos que rico en soledad"
      
    ];

    // -------- SHUFFLE SYSTEM --------

    let shuffledReplies = [];
    let shuffleIndex = 0;

    function shuffleArray(array) {
      const a = array.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getNextReply() {

      if (shuffleIndex >= shuffledReplies.length) {
        shuffledReplies = shuffleArray(replies);
        shuffleIndex = 0;
      }

      const reply = shuffledReplies[shuffleIndex];
      shuffleIndex++;

      return reply;
    }

    function addLine(who, text) {
      const div = document.createElement('div');
      div.className = 'm';
      div.innerHTML = `<span class="${who === 'Du' ? 'u' : 'b'}">${who}:</span> ${escapeHtml(text)}`;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
      }[c]));
    }

    function botReply(userText){

      let r = getNextReply();

      if (typeof r === "function")
        r = r(userText);

      const extra =
        Math.random() < 0.35
          ? ` (Checksum: ${Math.floor(Math.random()*9000+1000)})`
          : "";

      setTimeout(
        () => addLine("KI", r + extra),
        350 + Math.random()*700
      );
    }

    function send(){
      const t = msg.value.trim();
      if(!t) return;
      msg.value = "";
      addLine("Du", t);
      botReply(t);
    }

    document.getElementById('send').addEventListener('click', send);

    msg.addEventListener('keydown', e => {
      if(e.key === 'Enter') send();
    });

    addLine("KI", "Buenos dias Jose . Soy tu Assistente personal desarollado por tu hermano Magnus.");
  </script>
</body>
</html>
